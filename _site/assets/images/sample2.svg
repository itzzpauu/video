<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#191970;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000080;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo del cielo nocturno -->
  <rect width="400" height="250" fill="url(#nightSky)"/>
  
  <!-- Edificios -->
  <rect x="50" y="150" width="40" height="100" fill="#2F4F4F"/>
  <rect x="100" y="120" width="50" height="130" fill="#333333"/>
  <rect x="160" y="140" width="35" height="110" fill="#2F4F4F"/>
  <rect x="200" y="100" width="60" height="150" fill="#444444"/>
  <rect x="270" y="130" width="45" height="120" fill="#2F4F4F"/>
  <rect x="320" y="110" width="55" height="140" fill="#333333"/>
  
  <!-- Ventanas con luces -->
  <rect x="55" y="160" width="6" height="8" fill="#FFFF00"/>
  <rect x="65" y="160" width="6" height="8" fill="#FFFF00"/>
  <rect x="55" y="180" width="6" height="8" fill="#FFFF00"/>
  <rect x="75" y="180" width="6" height="8" fill="#FFFF00"/>
  
  <rect x="110" y="130" width="8" height="10" fill="#FFFF00"/>
  <rect x="125" y="130" width="8" height="10" fill="#FFFF00"/>
  <rect x="110" y="150" width="8" height="10" fill="#FFFF00"/>
  <rect x="135" y="150" width="8" height="10" fill="#FFFF00"/>
  <rect x="125" y="170" width="8" height="10" fill="#FFFF00"/>
  
  <rect x="210" y="110" width="8" height="10" fill="#FFFF00"/>
  <rect x="225" y="110" width="8" height="10" fill="#FFFF00"/>
  <rect x="240" y="110" width="8" height="10" fill="#FFFF00"/>
  <rect x="210" y="130" width="8" height="10" fill="#FFFF00"/>
  <rect x="240" y="130" width="8" height="10" fill="#FFFF00"/>
  <rect x="225" y="150" width="8" height="10" fill="#FFFF00"/>
  
  <rect x="330" y="120" width="8" height="10" fill="#FFFF00"/>
  <rect x="345" y="120" width="8" height="10" fill="#FFFF00"/>
  <rect x="360" y="120" width="8" height="10" fill="#FFFF00"/>
  <rect x="330" y="140" width="8" height="10" fill="#FFFF00"/>
  <rect x="360" y="140" width="8" height="10" fill="#FFFF00"/>
  
  <!-- Luna -->
  <circle cx="80" cy="50" r="20" fill="#F5F5DC"/>
  
  <!-- Estrellas -->
  <circle cx="150" cy="30" r="2" fill="white"/>
  <circle cx="200" cy="40" r="1.5" fill="white"/>
  <circle cx="250" cy="25" r="2" fill="white"/>
  <circle cx="300" cy="35" r="1.5" fill="white"/>
  <circle cx="350" cy="20" r="2" fill="white"/>
  <circle cx="120" cy="35" r="1" fill="white"/>
  <circle cx="280" cy="50" r="1" fill="white"/>
  
  <!-- Texto -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">Ciudad de Noche</text>
</svg>