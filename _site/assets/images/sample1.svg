<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98FB98;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo del cielo -->
  <rect width="400" height="250" fill="url(#skyGradient)"/>
  
  <!-- Montañas -->
  <polygon points="0,180 100,120 200,140 300,100 400,130 400,250 0,250" fill="#8B7D6B"/>
  <polygon points="50,200 150,140 250,160 350,120 400,140 400,250 0,250" fill="#A0926B"/>
  
  <!-- Sol -->
  <circle cx="350" cy="80" r="25" fill="#FFD700"/>
  
  <!-- Nubes -->
  <ellipse cx="100" cy="60" rx="20" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="55" rx="15" ry="10" fill="white" opacity="0.8"/>
  <ellipse cx="90" cy="55" rx="15" ry="10" fill="white" opacity="0.8"/>
  
  <ellipse cx="280" cy="70" rx="25" ry="15" fill="white" opacity="0.7"/>
  <ellipse cx="300" cy="65" rx="20" ry="12" fill="white" opacity="0.7"/>
  <ellipse cx="260" cy="65" rx="18" ry="11" fill="white" opacity="0.7"/>
  
  <!-- Texto -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">Paisaje de Montaña</text>
</svg>